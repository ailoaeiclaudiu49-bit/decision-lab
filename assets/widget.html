<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; color: #1c1e21; margin: 0; }
    .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 400px; margin: 0 auto; }
    h2 { margin: 0 0 10px 0; color: #1877f2; font-size: 20px; text-align: center; }
    .subtitle { text-align: center; color: #65676b; font-size: 13px; margin-bottom: 20px; }
    
    .weight-controls { margin-bottom: 25px; background: #f7f8fa; padding: 15px; border-radius: 12px; border: 1px solid #e4e6eb; }
    .weight-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .weight-row label { flex: 1; font-size: 12px; font-weight: 700; color: #4b4f56; text-transform: uppercase; }
    input[type=range] { flex: 2; accent-color: #1877f2; height: 6px; border-radius: 5px; }

    .results { display: flex; flex-direction: column; gap: 12px; }
    .option-result { background: #fff; border: 2px solid #f0f2f5; padding: 16px; border-radius: 12px; transition: all 0.3s ease; position: relative; }
    .option-result.winner { border-color: #2ecc71; background: #fafffa; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(46, 204, 113, 0.15); }
    
    .option-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .option-name { font-weight: 700; font-size: 16px; color: #1c1e21; }
    .score-pill { background: #e7f3ff; color: #1877f2; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
    .winner .score-pill { background: #2ecc71; color: white; }
    
    .progress-bg { height: 10px; background: #e4e6eb; border-radius: 5px; overflow: hidden; }
    .progress-fill { height: 100%; background: #1877f2; width: 0%; transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .winner .progress-fill { background: #2ecc71; }
    
    .winner-badge { position: absolute; top: -10px; right: 10px; background: #2ecc71; color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 800; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="title">Decision Lab</h2>
    <p class="subtitle">Adjust sliders to prioritize what matters to you.</p>
    
    <div class="weight-controls" id="controls"></div>

    <div class="results" id="results-list"></div>
  </div>

  <script>
    let globalData = { options: [], criteria: [] };
    let weights = [1, 1, 1, 1];

    function calculate() {
      if (!globalData.options.length) return;

      const scores = globalData.options.map(opt => {
        let weightedTotal = 0;
        let maxPossible = 0;
        opt.scores.forEach((s, i) => {
          weightedTotal += s * weights[i];
          maxPossible += 10 * weights[i];
        });
        return { name: opt.name, pct: maxPossible > 0 ? (weightedTotal / maxPossible) * 100 : 0 };
      });

      const highest = Math.max(...scores.map(s => s.pct));
      const list = document.getElementById('results-list');
      list.innerHTML = '';
      
      scores.forEach(s => {
        const isWinner = s.pct === highest && highest > 0;
        const div = document.createElement('div');
        div.className = `option-result ${isWinner ? 'winner' : ''}`;
        div.innerHTML = `
          ${isWinner ? '<div class="winner-badge">Top Match</div>' : ''}
          <div class="option-header">
            <span class="option-name">${s.name}</span>
            <span class="score-pill">${Math.round(s.pct)}%</span>
          </div>
          <div class="progress-bg"><div class="progress-fill" style="width: ${s.pct}%"></div></div>
        `;
        list.appendChild(div);
      });
    }

    function updateWeight(index, val) {
      weights[index] = parseInt(val);
      calculate();
    }

    const params = new URLSearchParams(window.location.search);
    try {
      if (params.has('data')) {
        const raw = decodeURIComponent(params.get('data'));
        globalData = JSON.parse(raw);
        document.getElementById('title').innerText = globalData.title || "Decision Matrix";
        
        const controls = document.getElementById('controls');
        globalData.criteria.forEach((c, i) => {
          const row = document.createElement('div');
          row.className = 'weight-row';
          row.innerHTML = `
            <label>${c}</label>
            <input type="range" min="0" max="10" value="5" oninput="updateWeight(${i}, this.value)">
          `;
          controls.appendChild(row);
          weights[i] = 5; // Default weight
        });
        calculate();
      }
    } catch (e) {
      console.error("UI Error:", e);
    }
  </script>
</body>
</html>
